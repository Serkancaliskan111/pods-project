
[functions.admin-create-user]
enabled = true
# Kapalı: geçit JWT’si publishable key ile 401 verebiliyor. Yetki kontrolü index.ts içinde.
verify_jwt = false
import_map = "./functions/admin-create-user/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/admin-create-user/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/admin-create-user/*.html" ]
